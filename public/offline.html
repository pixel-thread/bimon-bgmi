<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>PUBGMI</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888;
      --amber: #f59e0b;
      --amber-dim: rgba(245, 158, 11, 0.15);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(245, 158, 11, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(245, 158, 11, 0.02) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 2rem 1.5rem;
    }

    /* Animated wifi icon */
    .icon-container {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: var(--amber-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.1); }
      50% { box-shadow: 0 0 20px 5px rgba(245, 158, 11, 0.08); }
    }

    .icon-container svg {
      width: 36px;
      height: 36px;
      color: var(--amber);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.375rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      text-align: center;
      max-width: 280px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 2rem;
      width: 100%;
      max-width: 280px;
    }

    .btn {
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #000;
    }

    .btn-primary:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn.loading .spinner {
      display: block;
    }

    .btn.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Connection status indicator */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 1rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--surface-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      z-index: 10;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 2s ease-in-out infinite;
    }

    .status-dot.online {
      background: #22c55e;
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Reconnecting state */
    .reconnecting {
      display: none;
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: var(--amber);
      animation: fade-pulse 1.5s ease-in-out infinite;
    }

    .reconnecting.active {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    @keyframes fade-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Light theme support */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f5;
        --surface: rgba(0, 0, 0, 0.03);
        --surface-border: rgba(0, 0, 0, 0.06);
        --text: #18181b;
        --text-muted: #71717a;
        --amber-dim: rgba(245, 158, 11, 0.1);
      }

      body::before {
        background: radial-gradient(circle at 30% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="icon-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>

    <h1>No Connection</h1>
    <p class="subtitle">Visit a page while online first, and it'll be available offline next time</p>

    <div class="actions">
      <button class="btn btn-primary" id="retryBtn" onclick="retryConnection()">
        <span class="spinner"></span>
        <span class="btn-text">Retry Connection</span>
      </button>
    </div>

    <div class="reconnecting" id="reconnecting">
      <span class="spinner" style="display:block;width:14px;height:14px;border-width:1.5px"></span>
      Reconnecting...
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Offline</span>
  </div>

  <script>
    function retryConnection() {
      var btn = document.getElementById('retryBtn');
      btn.classList.add('loading');

      fetch('/', { cache: 'no-store', mode: 'no-cors' })
        .then(function () {
          window.location.href = '/';
        })
        .catch(function () {
          btn.classList.remove('loading');
        });

      // Timeout fallback
      setTimeout(function () {
        btn.classList.remove('loading');
      }, 5000);
    }

    // Auto-reconnect when connection is restored
    window.addEventListener('online', function () {
      var dot = document.getElementById('statusDot');
      var text = document.getElementById('statusText');
      dot.classList.add('online');
      text.textContent = 'Back online — reloading...';

      setTimeout(function () {
        window.location.href = '/';
      }, 500);
    });

    // Periodic check
    var checkInterval = setInterval(function () {
      if (navigator.onLine) {
        document.getElementById('reconnecting').classList.add('active');
        fetch('/', { cache: 'no-store', mode: 'no-cors' })
          .then(function () {
            window.location.href = '/';
          })
          .catch(function () {
            document.getElementById('reconnecting').classList.remove('active');
          });
      }
    }, 5000);
  </script>
</body>

</html>
