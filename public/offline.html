<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>PUBGMI</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 320px;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
      background: #000;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.2);
    }

    .logo img {
      width: 80px;
      height: auto;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f59e0b;
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .offline-icon {
      width: 20px;
      height: 20px;
      opacity: 0.6;
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 500;
      color: #fff;
      opacity: 0.9;
    }

    p {
      font-size: 0.875rem;
      color: #666;
      margin-top: 0.25rem;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn {
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #000;
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.12);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .btn.loading .spinner {
      display: block;
    }

    .btn.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hint {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #444;
    }

    /* Auto-retry indicator */
    .auto-retry {
      display: none;
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: #666;
    }

    .auto-retry.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      <span class="logo-text">PUBGMI</span>
    </div>

    <div class="status">
      <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path
          d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
      </svg>
      <h1>You're offline</h1>
    </div>

    <p>Check your connection and try again</p>

    <div class="actions">
      <button class="btn btn-primary" id="retryBtn" onclick="retryConnection()">
        <span class="spinner"></span>
        <span class="btn-text">Try Again</span>
      </button>
    </div>

    <p class="auto-retry" id="autoRetry">Retrying automatically...</p>

    <p class="hint">The app will reconnect when you're back online</p>
  </div>

  <script>
    let retryCount = 0;
    let retryTimeout = null;

    function retryConnection() {
      const btn = document.getElementById('retryBtn');
      btn.classList.add('loading');
      
      // Try to fetch a small resource to check connectivity
      fetch('/manifest.json', { cache: 'no-store' })
        .then(response => {
          if (response.ok) {
            // We're back online, reload the page
            window.location.reload();
          } else {
            throw new Error('Still offline');
          }
        })
        .catch(() => {
          btn.classList.remove('loading');
          // Show feedback
          retryCount++;
          if (retryCount >= 3) {
            document.getElementById('autoRetry').classList.add('active');
            scheduleAutoRetry();
          }
        });
    }

    function scheduleAutoRetry() {
      if (retryTimeout) return;
      
      retryTimeout = setTimeout(() => {
        retryTimeout = null;
        if (!navigator.onLine) {
          scheduleAutoRetry();
        } else {
          retryConnection();
        }
      }, 5000);
    }

    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check connection status periodically
    if (!navigator.onLine) {
      scheduleAutoRetry();
    }
  </script>
</body>

</html>
